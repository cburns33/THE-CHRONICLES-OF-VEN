# Nginx config — reverse proxy for Streamlit UI and FastAPI
# Place at: /etc/nginx/sites-available/inherited-cloud
# Then: ln -s /etc/nginx/sites-available/inherited-cloud /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx

server {
    listen 80;
    # Replace with your VPS IP or domain name
    server_name novel.talos-advisory.com;

    # Streamlit UI — author-facing (root path)
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # FastAPI — for ChatGPT/API queries
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
